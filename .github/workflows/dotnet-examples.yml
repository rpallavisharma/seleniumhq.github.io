name: Run DotNet examples

on:
  schedule:
    - cron: '35 22 * * *'
  workflow_dispatch:
  pull_request:
    branches:
      - trunk
    paths:
      - 'examples/dotnet/**'
  push:
    branches:
      - trunk
    paths:
      - 'examples/dotnet/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DISPLAY: :99
  GITHUB_TOKEN: ${{ secrets.SELENIUM_CI_TOKEN }}
  GH_TOKEN: ${{ secrets.SELENIUM_CI_TOKEN }}

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && fromJSON('["ubuntu", "windows", "macos"]') || fromJSON('["ubuntu", "windows"]') }}
        release: [ stable, nightly ]
    runs-on: ${{ format('{0}-latest', matrix.os) }}
    steps:
    - name: Checkout GitHub repo
      uses: actions/checkout@v6
    - name: Remove driver directories Windows
      if: matrix.os == 'windows'
      run: |
        rm "$env:ChromeWebDriver" -r -v
        rm "$env:EdgeWebDriver" -r -v
        rm "$env:GeckoWebDriver" -r -v
    - name: Remove driver directories Non-Windows
      if: matrix.os != 'windows'
      run: |
        sudo rm -rf $CHROMEWEBDRIVER $EDGEWEBDRIVER $GECKOWEBDRIVER
    - name: Start Xvfb
      if: matrix.os == 'ubuntu'
      run: Xvfb :99 &
    - name: Set up .Net Stable
      if: matrix.release == 'stable'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.x
    - name: Set up .Net Nightly
      if: matrix.release == 'nightly'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.x
        source-url: https://nuget.pkg.github.com/seleniumhq/index.json
      env:
        NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
    - name: Update Nightly version non-Windows
      if: matrix.release == 'nightly' && matrix.os != 'windows'
      run:
        |
        pip install -r ./scripts/requirements.txt
        latest_nightly=$(python ./scripts/latest-nightly-version.py nuget Selenium.WebDriver)
        echo $latest_nightly
        dotnet add examples/dotnet/SeleniumDocs/SeleniumDocs.csproj package Selenium.WebDriver --version $latest_nightly
        dotnet add examples/dotnet/SeleniumDocs/SeleniumDocs.csproj package Selenium.Support --version $latest_nightly
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Update Nightly version Windows
      if: matrix.release == 'nightly' && matrix.os == 'windows'
      shell: pwsh
      run:
        |
        pip install -r ./scripts/requirements.txt
        $latest_nightly = python ./scripts/latest-nightly-version.py nuget Selenium.WebDriver
        dotnet add examples/dotnet/SeleniumDocs/SeleniumDocs.csproj package Selenium.WebDriver --version $latest_nightly
        dotnet add examples/dotnet/SeleniumDocs/SeleniumDocs.csproj package Selenium.Support --version $latest_nightly
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 11
    - name: Run tests
      uses: nick-fields/retry@v3.0.2
      with:
        timeout_minutes: 40
        max_attempts: 2
        command: |
          cd examples/dotnet/SeleniumDocs
          dotnet test
